; =============================================================================
; ESP-Agri Mesh Pump Control System
; PlatformIO Multi-Environment Configuration
;
; Environments:
;   esp_relay  — Node A (Pump / Relay)    → upload to /dev/ttyUSB1
;   esp_remote — Node B (Button / Remote) → upload to /dev/ttyUSB0
;   esp_extender — Node C (Mesh extender)
;   esp_sensor   — Node D (Farm sensor)
;
; Build:   pio run
; Upload:  pio run -e esp_relay  -t upload
;          pio run -e esp_remote -t upload
; Monitor: pio device monitor -e esp_relay
; =============================================================================

[platformio]
default_envs = esp_relay, esp_remote

; ---------- Shared settings ----------
[env]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200

lib_deps =
    painlessmesh/painlessMesh @ ^1.5.0
    bblanchon/ArduinoJson @ ^7.4.2
    adafruit/Adafruit SSD1306 @ ^2.5.7
    links2004/WebSockets @ ^2.4.1

build_flags =
    -DCORE_DEBUG_LEVEL=3

; ---------- Node A: Relay / Pump ----------
[env:esp_relay]
build_src_filter = -<*> +<esp_relay.cpp>
build_flags =
    ${env.build_flags}
    -DAGRI_NODE_ROLE=0
upload_port = /dev/ttyUSB1
monitor_port = /dev/ttyUSB1

; ---------- Node B: Remote / Button ----------
[env:esp_remote]
build_src_filter = -<*> +<esp_remote.cpp>
build_flags =
    ${env.build_flags}
    -DAGRI_NODE_ROLE=1
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0

; ---------- Node C: Extender ----------
[env:esp_extender]
build_src_filter = -<*> +<esp_extender.cpp>
build_flags =
    ${env.build_flags}
    -DAGRI_NODE_ROLE=2
upload_port = /dev/ttyUSB2
monitor_port = /dev/ttyUSB2

; ---------- Node D: Sensor ----------
[env:esp_sensor]
build_src_filter = -<*> +<esp_sensor.cpp>
build_flags =
    ${env.build_flags}
    -DAGRI_NODE_ROLE=3
upload_port = /dev/ttyUSB3
monitor_port = /dev/ttyUSB3
